<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask File Manager</title>
    <!-- Tailwind CSS CDN for quick, modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <div class="max-w-4xl mx-auto py-10 px-4">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-blue-600 tracking-tight">Flask File Manager</h1>
            <p class="text-gray-500 mt-2">Upload, manage, and download your stored files</p>
        </header>

        <!-- Upload Section -->
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 mb-8">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Upload New File</h2>
            <form id="uploadForm" class="flex flex-col sm:flex-row gap-4">
                <input 
                    type="file" 
                    id="fileInput" 
                    required 
                    class="flex-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
                <button 
                    type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2.5 rounded-md transition duration-150 ease-in-out"
                >
                    Upload
                </button>
            </form>
            <div id="uploadMessage" class="mt-3 text-sm hidden"></div>
        </div>

        <!-- Files List Section -->
        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-semibold text-gray-700">Stored Files</h2>
                <button 
                    onclick="loadFiles()" 
                    class="text-sm text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1"
                >
                    🔄 Refresh List
                </button>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="text-center py-12 text-gray-400 hidden">
                <p class="text-lg">No files uploaded yet.</p>
                <p class="text-sm mt-1">Use the form above to add your first file!</p>
            </div>

            <!-- Files Table -->
            <div class="overflow-x-auto">
                <table id="filesTable" class="w-full text-left border-collapse hidden">
                    <thead>
                        <tr class="border-b border-gray-200 text-gray-500 text-sm uppercase">
                            <th class="py-3 px-4 font-semibold">File Name</th>
                            <th class="py-3 px-4 font-semibold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="filesList" class="divide-y divide-gray-100 text-sm">
                        <!-- Dynamic content loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Interactive JavaScript -->
    <script>
        const API_URL = '/files';

        // Load files on page boot
        document.addEventListener('DOMContentLoaded', loadFiles);

        // Fetch and render the file list
        async function loadFiles() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const files = data.files || [];
                
                const table = document.getElementById('filesTable');
                const emptyState = document.getElementById('emptyState');
                const tbody = document.getElementById('filesList');
                
                tbody.innerHTML = '';

                if (files.length === 0) {
                    table.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    return;
                }

                table.classList.remove('hidden');
                emptyState.classList.add('hidden');

                files.forEach(file => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50 transition-colors duration-150';
                    row.innerHTML = `
                        <td class="py-3 px-4 font-medium text-gray-700">
                            <a href="${API_URL}/${encodeURIComponent(file)}" download class="hover:text-blue-600 hover:underline flex items-center gap-2">
                                📄 ${file}
                            </a>
                        </td>
                        <td class="py-3 px-4 text-right flex justify-end gap-2">
                            <button onclick="renameFile('${file}')" class="text-xs bg-gray-100 hover:bg-yellow-100 hover:text-yellow-800 text-gray-600 font-semibold px-3 py-1.5 rounded transition">
                                Rename
                            </button>
                            <button onclick="deleteFile('${file}')" class="text-xs bg-gray-100 hover:bg-red-100 hover:text-red-800 text-gray-600 font-semibold px-3 py-1.5 rounded transition">
                                Delete
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error('Error fetching files:', err);
                alert('Failed to load file list.');
            }
        }

        // Upload handler
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const messageDiv = document.getElementById('uploadMessage');
            
            if (fileInput.files.length === 0) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            messageDiv.className = "mt-3 text-sm text-blue-600";
            messageDiv.textContent = "Uploading...";
            messageDiv.classList.remove('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (response.ok) {
                    messageDiv.className = "mt-3 text-sm text-green-600";
                    messageDiv.textContent = result.message;
                    fileInput.value = ''; // Reset input
                    loadFiles(); // Refresh list
                } else {
                    messageDiv.className = "mt-3 text-sm text-red-600";
                    messageDiv.textContent = result.error || 'Upload failed.';
                }
            } catch (err) {
                messageDiv.className = "mt-3 text-sm text-red-600";
                messageDiv.textContent = 'Server error during upload.';
            }
        });

        // Delete handler
        async function deleteFile(filename) {
            if (!confirm(`Are you sure you want to delete "${filename}"?`)) return;

            try {
                const response = await fetch(`${API_URL}/${encodeURIComponent(filename)}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (response.ok) {
                    loadFiles();
                } else {
                    alert(result.error || 'Failed to delete file.');
                }
            } catch (err) {
                alert('Error connecting to the server.');
            }
        }

        // Rename handler
        async function renameFile(filename) {
            const newFilename = prompt(`Enter a new name for "${filename}":`, filename);
            if (!newFilename || newFilename === filename) return;

            try {
                const response = await fetch(`${API_URL}/${encodeURIComponent(filename)}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ new_filename: newFilename })
                });
                const result = await response.json();

                if (response.ok) {
                    loadFiles();
                } else {
                    alert(result.error || 'Failed to rename file.');
                }
            } catch (err) {
                alert('Error connecting to the server.');
            }
        }
    </script>
</body>
</html>
